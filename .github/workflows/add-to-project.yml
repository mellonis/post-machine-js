name: Add to project

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v2
        with:
          project-url: https://github.com/users/mellonis/projects/5
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
